name: Rebuild recipe site

on:
  push:
    branches:
      - main
    paths:
      - "recipes/**/*.md"
      - "data/pantry.md"
      - "scripts/build-recipes.R"
      - ".github/workflows/rebuild-site.yml"

permissions:
  contents: write

jobs:
  rebuild:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Rebuild generated site data and recipe pages
        run: Rscript scripts/build-recipes.R

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/site-data.json recipes
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
          else
            git commit -m "Rebuild generated recipe site"
            git push
          fi
