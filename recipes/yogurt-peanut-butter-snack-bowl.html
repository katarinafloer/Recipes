      <h1>Yogurt Peanut Butter Snack Bowl</h1>
      <p class="recipe-page-meta">Snack · 5 min · 1</p>

<h2>Ingredients</h2>
<ul>
<li>Greek yogurt</li>
<li>peanut butter</li>
<li>banana</li>
<li>granola</li>
</ul>
<h2>Notes</h2>
<p>Add cinnamon if you have it. Works as breakfast when scaled up.</p>
<h2>Steps</h2>
<ol>
<li>Spoon yogurt into a bowl.</li>
<li>Swirl in peanut butter.</li>
<li>Top with banana and granola.</li>
</ol>
